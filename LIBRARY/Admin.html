<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Admin - Payment Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        
        /* Request Notification Box */
        #request-panel {
            max-width: 800px; margin: 0 auto 30px;
            background: white; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden; border-top: 5px solid orange;
        }
        .panel-header { background: #fff8f0; padding: 15px; border-bottom: 1px solid #ffe0b2; }
        .panel-header h3 { margin: 0; color: #e65100; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #request-list { padding: 15px; max-height: 300px; overflow-y: auto; }
        .req-item {
            background: #fff; border: 1px solid #eee; padding: 12px;
            margin-bottom: 10px; border-radius: 8px; display: flex;
            justify-content: space-between; align-items: center;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .req-info b { color: #d35400; font-size: 1.1em; }
        .actions button { 
            padding: 8px 15px; border: none; border-radius: 5px; 
            cursor: pointer; font-weight: bold; margin-left: 5px; 
        }
        .btn-approve { background: #2ecc71; color: white; }
        .btn-reject { background: #e74c3c; color: white; }

        /* Grid Styling */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 500px; margin: 20px auto; }
        .seat { width: 40px; height: 40px; border: 1px solid #ccc; background: white; line-height: 40px; border-radius: 4px; font-size: 12px; }
        .seat.booked { background: orange !important; color: white; border: none; }
        
        .empty-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <audio id="notificationSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="hall-title">THE PREFECT STUDY LIBRARY - ADMIN</div>

    <div id="request-panel">
        <div class="panel-header">
            <h3><i class="fas fa-bell-ring"></i> Pending Payment Requests</h3>
        </div>
        <div id="request-list">
            <p class="empty-msg">No new requests</p>
        </div>
    </div>

    <div id="grid-view" class="grid"></div>

    <script>
        let lastRequestCount = 0;

        function checkNewRequests() {
            const requests = JSON.parse(localStorage.getItem('paymentRequests')) || {};
            const requestContainer = document.getElementById('request-list');
            const currentCount = Object.keys(requests).length;

            // RING ALERT Logic: Agar nayi request aayi hai toh bell bajao
            if (currentCount > lastRequestCount) {
                document.getElementById('notificationSound').play();
            }
            lastRequestCount = currentCount;

            if (currentCount === 0) {
                requestContainer.innerHTML = '<p class="empty-msg">No pending requests</p>';
                return;
            }

            requestContainer.innerHTML = "";
            for (let seatId in requests) {
                let req = requests[seatId];
                let div = document.createElement('div');
                div.className = 'req-item';
                div.innerHTML = `
                    <div class="req-info">
                        <b>Seat ${seatId}</b> | ${req.name} | <i class="fas fa-phone"></i> ${req.contact}
                    </div>
                    <div class="actions">
                        <button class="btn-approve" onclick="approveBooking('${seatId}')">Confirm Payment</button>
                        <button class="btn-reject" onclick="rejectBooking('${seatId}')">Reject</button>
                    </div>
                `;
                requestContainer.appendChild(div);
            }
        }

        function approveBooking(seatId) {
            const requests = JSON.parse(localStorage.getItem('paymentRequests')) || {};
            const bookings = JSON.parse(localStorage.getItem('libData')) || {};

            // Move to permanent bookings
            bookings[seatId] = requests[seatId];
            localStorage.setItem('libData', JSON.stringify(bookings));

            // Clean up request
            delete requests[seatId];
            localStorage.setItem('paymentRequests', JSON.stringify(requests));

            alert("Seat " + seatId + " confirmed and booked!");
            renderAdminGrid();
            checkNewRequests();
        }

        function rejectBooking(seatId) {
            if(confirm("Are you sure you want to delete this request?")) {
                const requests = JSON.parse(localStorage.getItem('paymentRequests')) || {};
                delete requests[seatId];
                localStorage.setItem('paymentRequests', JSON.stringify(requests));
                checkNewRequests();
            }
        }

        function renderAdminGrid() {
            const bookings = JSON.parse(localStorage.getItem('libData')) || {};
            const grid = document.getElementById('grid-view');
            grid.innerHTML = "";
            for (let i = 1; i <= 135; i++) {
                let id = i.toString().padStart(2, '0');
                let div = document.createElement('div');
                div.className = 'seat' + (bookings[id] ? ' booked' : '');
                div.innerText = id;
                grid.appendChild(div);
            }
        }

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            // Password Protection
            const pin = prompt("Enter Admin PIN:");
            if (pin !== "1234") {
                document.body.innerHTML = "<h1>Unauthorized Access!</h1>";
                return;
            }
            
            renderAdminGrid();
            checkNewRequests();
            // 5 second sync
            setInterval(() => {
                checkNewRequests();
                renderAdminGrid();
            }, 5000);
        });
    </script>
</body>
</html>
