<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner - Seat Management | The Prefect Study</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f4f4f4; padding-bottom: 50px; }
        .row { display: flex; justify-content: center; margin: 5px; }
        .seat { width: 35px; height: 35px; border: 2px solid green; margin: 3px; line-height: 35px; border-radius: 5px; cursor: pointer; background: white; font-size: 12px; transition: 0.3s; }
        .seat.booked { background-color: rgb(61, 17, 52) !important; color: white; border: none; }
        .gap { width: 40px; }
        
        /* Modal Styling */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { background: white; margin: 10% auto; padding: 25px; width: 320px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); border-top: 5px solid rgb(61, 17, 52); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .price-display { background: #fff8f0; padding: 10px; border-radius: 8px; font-weight: bold; color: #e67e22; margin: 10px 0; border: 1px dashed #e67e22; }
        
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: rgb(61, 17, 52); color: white; width: 100%; font-size: 16px; }
        .btn-reset { background: #e74c3c; color: white; margin-top: 15px; width: 100%; }
        .btn-close { margin-top: 10px; background: #ddd; width: 100%; color: #333; }
        
        h2 { color: rgb(61, 17, 52); margin-top: 30px; }
    </style>
</head>
<body>
    <h2>OWNER DASHBOARD - HALL 01</h2>
    <div id="grid"></div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="mTitle" style="margin-top:0; color:rgb(61, 17, 52);"></h3>
            
            <div id="formSection">
                <input type="text" id="sName" placeholder="Student Name">
                <input type="text" id="sContact" placeholder="Contact No" maxlength="10">
                
                <div id="plan-selector">
                    <label style="font-size: 12px; font-weight: bold; display: block; text-align: left; margin-left: 5px;">SELECT PLAN:</label>
                    <select id="sPlan" onchange="updatePriceDisplay()">
                        <option value="unreserved">Unreserved Plan (₹800)</option>
                        <option value="reserved">Reserved Plan (₹950)</option>
                        <option value="premium" id="opt-premium" style="display:none;">Premium Cabin (₹1250)</option>
                    </select>
                </div>

                <div class="price-display">
                    Final Amount: ₹<span id="display-amt">800</span>
                </div>

                <button class="btn-save" onclick="save()">Confirm Booking</button>
            </div>

            <div id="infoSection" style="display:none">
                <div style="text-align: left; background: #f9f9f9; padding: 15px; border-radius: 8px; font-size: 14px;">
                    <p id="details" style="margin:0; line-height:1.6;"></p>
                </div>
                <button class="btn-reset" onclick="remove()">Vacate Seat</button>
            </div>
            
            <button class="btn-close" onclick="closeM()">Cancel</button>
        </div>
    </div>

    <script>
        let currentSeatId = null;
        let libData = JSON.parse(localStorage.getItem('libData')) || {};

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            // Render Hall Seats (01-135)
            let count = 1;
            for (let r = 1; r <= 14; r++) {
                let row = document.createElement('div');
                row.className = 'row';
                for (let s = 1; s <= 10; s++) {
                    if (count > 135) break;
                    let id = count.toString().padStart(2, '0');
                    renderSeat(row, id);
                    if (s === 5 && count <= 130) row.appendChild(Object.assign(document.createElement('div'), {className: 'gap'}));
                    count++;
                }
                grid.appendChild(row);
            }

            // Render Cabin Seats
            const cabinIds = ['C-126', 'C-127', 'C-128', 'C-129', 'C-133', 'C-134', 'C-135', 'C-136'];
            let cabinRow = document.createElement('div');
            cabinRow.className = 'row';
            cabinRow.style.marginTop = "20px";
            cabinIds.forEach(id => renderSeat(cabinRow, id));
            grid.appendChild(cabinRow);
        }

        function renderSeat(parent, id) {
            let seat = document.createElement('div');
            seat.className = 'seat' + (libData[id] ? ' booked' : '');
            seat.innerText = id;
            seat.onclick = () => openM(id);
            parent.appendChild(seat);
        }

        function updatePriceDisplay() {
            const plan = document.getElementById('sPlan').value;
            let price = 800;
            if (plan === 'reserved') price = 950;
            if (plan === 'premium') price = 1250;
            document.getElementById('display-amt').innerText = price;
        }

        function openM(id) {
            currentSeatId = id;
            document.getElementById('mTitle').innerText = "Allot Seat: " + id;
            document.getElementById('modal').style.display = 'block';
            
            const planSelect = document.getElementById('sPlan');
            const premOpt = document.getElementById('opt-premium');

            // Cabin detection logic
            if (id.startsWith('C')) {
                premOpt.style.display = "block";
                planSelect.value = "premium";
                planSelect.disabled = true;
            } else {
                premOpt.style.display = "none";
                planSelect.value = "unreserved";
                planSelect.disabled = false;
            }
            updatePriceDisplay();

            if (libData[id]) {
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('infoSection').style.display = 'block';
                const d = libData[id];
                document.getElementById('details').innerHTML = `
                    <b>Student:</b> ${d.name}<br>
                    <b>Mobile:</b> ${d.contact}<br>
                    <b>Plan:</b> ${d.type || 'N/A'}<br>
                    <b>Amount:</b> ₹${d.amount || '0'}<br>
                    <b>Date:</b> ${d.time || '---'}
                `;
            } else {
                document.getElementById('formSection').style.display = 'block';
                document.getElementById('infoSection').style.display = 'none';
                document.getElementById('sName').value = "";
                document.getElementById('sContact').value = "";
            }
        }

        function save() {
            const name = document.getElementById('sName').value;
            const contact = document.getElementById('sContact').value;
            const plan = document.getElementById('sPlan').value;
            const amount = document.getElementById('display-amt').innerText;
            
            if (name && contact) {
                libData[currentSeatId] = { 
                    name: name, 
                    contact: contact,
                    amount: amount,
                    type: plan.charAt(0).toUpperCase() + plan.slice(1),
                    time: new Date().toISOString().split('T')[0] // Sirf Date save hogi
                };
                localStorage.setItem('libData', JSON.stringify(libData));
                alert("Seat Allotted Successfully!");
                location.reload();
            } else {
                alert("Please fill all details!");
            }
        }

        function remove() {
            if(confirm("Are you sure you want to vacate this seat?")) {
                delete libData[currentSeatId];
                localStorage.setItem('libData', JSON.stringify(libData));
                location.reload();
            }
        }

        function closeM() { document.getElementById('modal').style.display='none'; }
        
        window.onload = () => {
            const pin = prompt("Enter Admin PIN");
            if(pin === "1234") init();
            else document.body.innerHTML = "<h1 style='margin-top:100px;'>Unauthorized Access!</h1>";
        };
       function save() {
    const name = document.getElementById('sName').value;
    const contact = document.getElementById('sContact').value;
    const plan = document.getElementById('sPlan').value;
    const amount = document.getElementById('display-amt').innerText;
    
    if (name && contact) {
        const scriptURL = 'https://script.google.com/macros/s/AKfycbziCDMw_yVDWop4dJxcNL9o5oZsVuJL3znBClId9Z2hQ-Wed8k518IrHkXBHndbwZA/exec';
        
        const data = {
            seatId: currentSeatId,
            name: name,
            contact: contact,
            amount: amount,
            type: plan + " (Direct Allot)"
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

        libData[currentSeatId] = { ...data, time: new Date().toISOString().split('T')[0] };
        localStorage.setItem('libData', JSON.stringify(libData));
        alert("Seat Allotted & Sheet Updated!");
        location.reload();
    } else {
        alert("Details bhariye!");
    }
}
    </script>
</body>
</html>
